<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>202 공쥬들의 신나는 청소시간</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👑</text></svg>">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff6b9d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="공쥬 청소">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
            color: #2d3436;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
            background: linear-gradient(135deg, #ffeef8 0%, #e8f4ff 35%, #f5f0ff 65%, #fffbe8 100%);
            background-size: 200% 200%;
            animation: bgMove 14s ease-in-out infinite alternate;
        }
        @keyframes bgMove {
            0%   { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        /* 파스텔 오로라 */
        .bg-aurora {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background:
                radial-gradient(ellipse at 15% 35%, rgba(255,150,200,0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 85% 15%, rgba(100,190,255,0.28) 0%, transparent 45%),
                radial-gradient(ellipse at 55% 80%, rgba(180,130,255,0.22) 0%, transparent 45%),
                radial-gradient(ellipse at 30% 65%, rgba(255,220,80,0.2) 0%, transparent 40%);
            animation: aurora 10s ease-in-out infinite alternate;
        }
        @keyframes aurora {
            0%   { filter: hue-rotate(0deg)   brightness(1);   }
            50%  { filter: hue-rotate(20deg)  brightness(1.1); }
            100% { filter: hue-rotate(-15deg) brightness(1.05); }
        }

        /* 떠다니는 파티클 */
        .particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .particle {
            position: absolute; opacity: 0;
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0%   { transform: translateY(0) rotate(0deg);   opacity: 0; }
            10%  { opacity: 0.55; }
            90%  { opacity: 0.3; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        /* ── 공통 버튼 ── */
        .btn-primary {
            background: linear-gradient(135deg, #ff6b9d, #45aaf2);
            border: none; color: white;
            font-size: 1.7em; font-weight: 900; font-family: inherit;
            padding: 18px 70px; border-radius: 50px; cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 6px 25px rgba(69,170,242,0.4);
            letter-spacing: 2px; text-shadow: 0 1px 3px rgba(0,0,0,0.15);
        }
        .btn-primary:hover { transform: translateY(-4px) scale(1.03); box-shadow: 0 10px 35px rgba(69,170,242,0.55); }
        .btn-primary:active { transform: translateY(0) scale(0.98); }

        .btn-ctrl {
            padding: 10px 18px; border-radius: 30px;
            border: 2px solid rgba(0,0,0,0.1);
            background: rgba(255,255,255,0.6); color: #2d3436;
            font-size: 0.88em; font-family: inherit; cursor: pointer; transition: all 0.2s;
            backdrop-filter: blur(4px); font-weight: 700;
        }
        .btn-ctrl:hover { background: rgba(255,255,255,0.9); border-color: rgba(0,0,0,0.2); box-shadow: 0 3px 12px rgba(0,0,0,0.1); }

        .btn-fullscreen {
            position: absolute; top: 24px; right: 28px;
            background: rgba(255,255,255,0.6); border: 2px solid rgba(0,0,0,0.08);
            font-size: 1.6em; width: 52px; height: 52px; border-radius: 50%;
            cursor: pointer; transition: all 0.2s; line-height: 1;
        }
        .btn-fullscreen:hover { background: rgba(255,255,255,0.95); box-shadow: 0 3px 12px rgba(0,0,0,0.1); transform: scale(1.08); }

        /* 다음 단계 버튼 */
        .btn-skip {
            padding: 12px 24px; border-radius: 30px; border: none;
            background: linear-gradient(135deg, #45aaf2, #45aaf2);
            color: white; font-size: 1em; font-weight: 900;
            font-family: inherit; cursor: pointer; letter-spacing: 1px;
            animation: skipPulse 1.3s ease-in-out infinite;
            text-shadow: 0 1px 3px rgba(0,0,0,0.15);
        }
        @keyframes skipPulse {
            0%, 100% { transform: scale(1);    box-shadow: 0 0 14px rgba(69,170,242,0.4), 0 4px 12px rgba(0,0,0,0.1); }
            50%       { transform: scale(1.06); box-shadow: 0 0 28px rgba(69,170,242,0.6), 0 6px 16px rgba(0,0,0,0.12); }
        }

        /* 청소 끝 버튼 — 강조 */
        .btn-finish {
            padding: 12px 24px; border-radius: 30px; border: none;
            background: linear-gradient(135deg, #ff6b9d, #ff8e53);
            color: white; font-size: 1em; font-weight: 900;
            font-family: inherit; cursor: pointer; letter-spacing: 1px;
            animation: finishPulse 1.1s ease-in-out infinite;
            text-shadow: 0 1px 3px rgba(0,0,0,0.15);
        }
        @keyframes finishPulse {
            0%, 100% { transform: scale(1);    box-shadow: 0 0 16px rgba(255,107,157,0.45), 0 4px 12px rgba(0,0,0,0.12); }
            50%       { transform: scale(1.07); box-shadow: 0 0 32px rgba(255,107,157,0.75), 0 6px 18px rgba(0,0,0,0.15); }
        }

        /* ─── 커버 화면 ─── */
        #cover-screen {
            position: relative; z-index: 1;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; text-align: center; padding: 40px;
            gap: 0;
        }
        .cover-icon { font-size: 7em; margin-bottom: 20px; animation: floatIcon 3s ease-in-out infinite; }
        @keyframes floatIcon { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-18px); } }
        .cover-title { font-size: 3.6em; font-weight: 900; margin-bottom: 12px; }
        .cover-title .hl {
            background: linear-gradient(135deg, #ff6b9d, #45aaf2);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .cover-sub { font-size: 1.15em; color: rgba(0,0,0,0.38); margin-bottom: 55px; }
        .btn-cover {
            background: linear-gradient(135deg, #ff6b9d, #45aaf2);
            border: none; color: white;
            font-size: 2em; font-weight: 900; font-family: inherit;
            padding: 22px 90px; border-radius: 50px; cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 6px 28px rgba(255,107,157,0.45);
            letter-spacing: 3px; text-shadow: 0 1px 3px rgba(0,0,0,0.12);
            animation: coverPulse 1.8s ease-in-out infinite;
        }
        @keyframes coverPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 6px 28px rgba(255,107,157,0.45); }
            50%       { transform: scale(1.04); box-shadow: 0 10px 40px rgba(255,107,157,0.65); }
        }
        .btn-cover:hover { transform: scale(1.07) !important; }
        .btn-cover:active { transform: scale(0.97) !important; }

        /* ─── 뽑기 화면 ─── */
        #draw-screen {
            position: relative; z-index: 1;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; padding: 40px;
        }

        .main-title { font-size: 3.4em; font-weight: 900; text-align: center; margin-bottom: 6px; color: #2d3436; }
        .main-title .hl {
            background: linear-gradient(135deg, #ff6b9d, #45aaf2);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .main-subtitle { color: rgba(0,0,0,0.45); font-size: 1.1em; margin-bottom: 28px; }

        .draw-grid {
            display: grid; grid-template-columns: repeat(5, 1fr);
            gap: 20px; width: 100%; max-width: 1400px; margin-top: 30px; margin-bottom: 32px;
        }

        .flip-card { height: 300px; cursor: pointer; perspective: 1200px; }
        .flip-card-inner {
            position: relative; width: 100%; height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-card.flipped { cursor: default; }

        .flip-front, .flip-back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 24px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }

        /* 앞면 — 미스터리 (밝고 귀여운) */
        .flip-front {
            background: white;
            border: 3px dashed rgba(0,0,0,0.13);
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transition: all 0.2s;
        }
        .flip-card:not(.flipped):hover .flip-front {
            border-color: rgba(255,107,157,0.5);
            box-shadow: 0 8px 30px rgba(255,107,157,0.2);
            transform: translateY(-4px);
        }
        .mystery-emoji {
            font-size: 4.2em;
            animation: mysteryBounce 1.8s ease-in-out infinite;
            filter: drop-shadow(0 4px 8px rgba(255,200,0,0.4));
        }
        @keyframes mysteryBounce {
            0%, 100% { transform: translateY(0) scale(1) rotate(-3deg); }
            50%       { transform: translateY(-12px) scale(1.12) rotate(3deg); }
        }
        .flip-card:not(.flipped):hover .mystery-emoji { animation-duration: 0.5s; }
        .flip-front .tap-text { font-size: 0.92em; color: rgba(0,0,0,0.35); margin-top: 12px; font-weight: 700; letter-spacing: 2px; }

        /* 뒷면 */
        .flip-back {
            transform: rotateY(180deg);
            border: 3px solid; padding: 22px 16px; text-align: center;
            background: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .flip-back .role-icon { font-size: 3.6em; margin-bottom: 12px; }
        .flip-back .role-title { font-size: 1.4em; font-weight: 900; margin-bottom: 10px; }
        .flip-back .role-phase { font-size: 0.78em; font-weight: 700; letter-spacing: 2px; padding: 4px 14px; border-radius: 20px; }

        #start-wrap {
            opacity: 0; transform: translateY(14px);
            transition: opacity 0.5s, transform 0.5s; pointer-events: none;
        }
        #start-wrap.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }

        /* ─── 타이머 화면 ─── */
        #timer-screen {
            position: relative; z-index: 1;
            display: none; flex-direction: column;
            align-items: center; min-height: 100vh; height: 100vh; padding: 18px 35px 24px;
        }

        .top-bar {
            display: grid; grid-template-columns: 1fr auto 1fr;
            align-items: center; width: 100%; margin-bottom: 16px; gap: 20px;
        }
        .top-title { font-size: 1.4em; font-weight: 900; color: rgba(0,0,0,0.5); }

        .timer-center { display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .timers-row { display: flex; align-items: center; gap: 24px; }

        /* 단계 타이머 — 크게 */
        #phase-timer {
            font-size: 7em; font-weight: 900;
            font-variant-numeric: tabular-nums; line-height: 1;
            color: #45aaf2; transition: color 0.5s;
            filter: drop-shadow(0 3px 8px rgba(69,170,242,0.35));
        }
        .phase-timer-label { font-size: 0.82em; letter-spacing: 4px; color: rgba(0,0,0,0.38); text-align: center; margin-top: 2px; }

        .timer-divider { width: 2px; height: 56px; background: rgba(0,0,0,0.1); border-radius: 1px; }

        /* 전체 타이머 — 작게 */
        .total-block { display: flex; flex-direction: column; align-items: center; }
        #total-timer { font-size: 2.4em; font-weight: 900; font-variant-numeric: tabular-nums; color: rgba(0,0,0,0.35); transition: color 0.5s; }
        .total-label { font-size: 0.72em; letter-spacing: 3px; color: rgba(0,0,0,0.28); margin-top: 2px; }

        .progress-wrap {
            width: 320px; height: 8px;
            background: rgba(0,0,0,0.07);
            border-radius: 4px; overflow: hidden; margin-top: 8px;
        }
        #progress-bar {
            height: 100%; width: 100%;
            background: linear-gradient(90deg, #45aaf2, #ff6b9d);
            border-radius: 4px; transition: width 1s linear, background 0.5s;
        }

        .phase-badge {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 5px 20px; border-radius: 20px;
            font-size: 0.9em; font-weight: 700;
            margin-top: 6px; transition: all 0.4s;
        }
        .phase-badge.phase1 { background: rgba(69,170,242,0.1); border: 2px solid #45aaf2; color: #7c3aed; }
        .phase-badge.phase2 { background: rgba(255,107,157,0.1); border: 2px solid #ff6b9d; color: #e0245e; }

        .top-controls { display: flex; gap: 10px; justify-content: flex-end; align-items: center; }

        /* ─── 퀘스트 카드 ─── */
        .quest-grid {
            display: grid; grid-template-columns: repeat(5, 1fr);
            gap: 16px; width: 100%;
            align-items: start;
            margin-top: auto; margin-bottom: auto;
        }

        .quest-card {
            background: white;
            border: 3px solid; border-radius: 22px; padding: 10px 14px;
            text-align: center; cursor: pointer;
            transition: transform 0.25s, box-shadow 0.25s, opacity 0.4s;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; position: relative;
            box-shadow: 0 4px 16px rgba(0,0,0,0.07);
            height: 400px;
        }
        .quest-card:hover:not(.waiting):not(.card-done) {
            transform: translateY(-6px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.13);
        }
        .quest-card.waiting { opacity: 0.62; cursor: default; }
        .quest-card.card-done { opacity: 0.55; cursor: default; }

        .check-badge {
            position: absolute; top: 12px; right: 14px;
            font-size: 1.4em; opacity: 0; transition: opacity 0.3s;
        }
        .num-badge {
            position: absolute; top: 12px; left: 14px;
            width: 30px; height: 30px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.95em; font-weight: 900; color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .quest-card.tapped .check-badge,
        .quest-card.card-done .check-badge { opacity: 1; }

        .phase-tag {
            font-size: 0.72em; font-weight: 700; letter-spacing: 2px;
            padding: 3px 10px; border-radius: 10px; margin-bottom: 6px;
        }
        .quest-icon { font-size: 2.4em; margin-bottom: 6px; }
        .quest-role { font-size: 1.1em; font-weight: 900; margin-bottom: 4px; }
        .quest-desc { font-size: 0.83em; color: rgba(0,0,0,0.45); line-height: 1.6; margin-bottom: 6px; }
        .tap-hint { font-size: 0.72em; color: rgba(0,0,0,0.22); margin-top: 4px; }

        /* ─── 단계 전환 오버레이 ─── */
        #phase-overlay {
            display: none; position: fixed; inset: 0;
            background: linear-gradient(135deg, rgba(255,238,248,0.97) 0%, rgba(232,244,255,0.97) 50%, rgba(245,240,255,0.97) 100%);
            backdrop-filter: blur(8px);
            z-index: 100; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
        }
        .overlay-emoji { font-size: 7em; margin-bottom: 16px; animation: overlayBounce 0.6s ease-in-out infinite alternate; }
        @keyframes overlayBounce { from { transform: scale(1) rotate(-6deg); } to { transform: scale(1.18) rotate(6deg); } }
        .overlay-title {
            font-size: 4em; font-weight: 900; margin-bottom: 12px;
            background: linear-gradient(135deg, #ff6b9d, #45aaf2);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .overlay-sub { font-size: 1.4em; color: rgba(0,0,0,0.45); margin-bottom: 40px; font-weight: 700; }
        .btn-next-phase {
            background: linear-gradient(135deg, #ff6b9d, #45aaf2);
            border: none; color: white; font-size: 1.5em; font-weight: 900;
            font-family: inherit; padding: 18px 65px; border-radius: 50px;
            cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 6px 30px rgba(255,107,157,0.4);
            text-shadow: 0 1px 3px rgba(0,0,0,0.12);
        }
        .btn-next-phase:hover { transform: scale(1.06); box-shadow: 0 10px 40px rgba(255,107,157,0.55); }

        /* ─── 완료 화면 ─── */
        #done-screen {
            position: relative; z-index: 1;
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; text-align: center; padding: 40px;
        }
        .done-emoji { font-size: 7em; animation: bounce 0.7s ease-in-out infinite; margin-bottom: 20px; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-28px); } }
        .done-title {
            font-size: 4.5em; font-weight: 900; margin-bottom: 14px;
            background: linear-gradient(135deg, #ff6b9d, #45aaf2);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            animation: titleRainbow 2s linear infinite;
        }
        @keyframes titleRainbow { to { filter: hue-rotate(360deg); } }
        .done-sub { font-size: 1.5em; color: rgba(0,0,0,0.45); margin-bottom: 45px; }

        /* 무지개 배경 (완료 화면 전용) */
        .rainbow-bg {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background: linear-gradient(45deg, #ffeef8, #e8f4ff, #f5f0ff, #f0fff8, #fffbe8, #ffeef8);
            background-size: 400% 400%;
            animation: rainbowPulse 1.5s ease-in-out infinite, rainbowHue 3s linear infinite;
            opacity: 0.85;
        }
        @keyframes rainbowPulse {
            0%, 100% { background-position: 0% 50%; }
            50%       { background-position: 100% 50%; }
        }
        @keyframes rainbowHue { to { filter: hue-rotate(360deg); } }

        /* 10초 카운트다운 팝 */
        .countdown-pop {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20em; font-weight: 900;
            font-variant-numeric: tabular-nums;
            background: linear-gradient(135deg, #ff6b9d, #45aaf2);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            pointer-events: none; z-index: 60;
            animation: countPop 0.85s ease-out forwards;
        }
        @keyframes countPop {
            0%   { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
            35%  { transform: translate(-50%, -50%) scale(1.08); opacity: 0.95; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
        }

        /* 폭죽 */
        .confetti {
            position: fixed; top: -10px; font-size: 2em;
            animation: fall linear forwards; pointer-events: none; z-index: 999;
        }
        @keyframes fall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
    </style>
</head>
<body>

<div class="bg-aurora"></div>
<div class="particles" id="particles"></div>

<!-- ── 커버 화면 ── -->
<div id="cover-screen">
    <div class="cover-icon">👑</div>
    <div class="cover-title"><span class="hl">202 공쥬들의<br>신나는 청소시간</span></div>
    <div class="cover-sub">청소 퀘스트를 시작할 준비가 됐나요? 🪄</div>
    <button class="btn-cover" onclick="enterApp()">✨ 시작하기!</button>
</div>

<!-- ── 뽑기 화면 ── -->
<div id="draw-screen" style="display:none">
    <button class="btn-fullscreen" id="fs-btn" onclick="toggleFullscreen()" title="전체화면">⛶</button>
    <div class="main-title">✨ <span class="hl">202 공쥬들의 신나는 청소시간</span></div>
    <div class="main-subtitle">마법봉을 탭해서 내 역할을 확인하세요 🪄</div>
    <div class="draw-grid" id="draw-grid"></div>
    <div id="start-wrap">
        <button class="btn-primary" onclick="startCleaning()">🧹 청소 시작!</button>
    </div>
</div>

<!-- ── 타이머 화면 ── -->
<div id="timer-screen">
    <div class="top-bar">
        <div class="top-title">👑 202 공쥬들의 신나는 청소시간</div>

        <div class="timer-center">
            <div class="timers-row">
                <div style="display:flex;flex-direction:column;align-items:center;">
                    <div id="phase-timer">07:30</div>
                    <div class="phase-timer-label" id="phase-timer-label">1단계 남은 시간</div>
                </div>
                <div class="timer-divider"></div>
                <div class="total-block">
                    <div id="total-timer">15:00</div>
                    <div class="total-label">전체</div>
                </div>
            </div>
            <div class="progress-wrap"><div id="progress-bar"></div></div>
            <div class="phase-badge phase1" id="phase-badge">1단계 — 쓸기 &amp; 환기</div>
        </div>

        <div class="top-controls">
            <button class="btn-skip" id="skip-btn" onclick="skipPhase()">⚡ 다음 단계</button>
            <button class="btn-finish" id="finish-btn" onclick="finishCleaning()" style="display:none">🎊 청소 끝!</button>
            <button class="btn-ctrl" id="pause-btn" onclick="togglePause()">⏸ 일시정지</button>
            <button class="btn-ctrl" onclick="goToDraw()">↩ 처음으로</button>
        </div>
    </div>

    <div class="quest-grid" id="quest-grid"></div>
</div>

<!-- ── 단계 전환 오버레이 ── -->
<div id="phase-overlay">
    <div class="overlay-emoji">🪄</div>
    <div class="overlay-title">2단계 시작!</div>
    <div class="overlay-sub">쓸기 완료! 이제 대걸레 & 책상 줄 맞추기 차례예요 ✨</div>
    <button class="btn-next-phase" onclick="closeOverlay()">출발! ▶</button>
</div>

<!-- ── 완료 화면 ── -->
<div id="done-screen">
    <div class="done-emoji">🎉</div>
    <div class="done-title">청소 완료!</div>
    <div class="done-sub">공쥬들 덕분에 교실이 깨끗해졌어요! 모두 수고했어요 👑✨</div>
    <button class="btn-primary" style="font-size:1.3em;padding:16px 55px;" onclick="goToDraw()">🔄 다시 시작</button>
</div>

<script>
    const ROLE_DEFS = [
        {
            color: '#ff6b9d', colorBg: 'rgba(255,107,157,0.1)',
            phase: 1,
            phase1: { icon: '🧹', title: '앞·뒤 쓸기', desc: '교실 앞쪽과 뒤쪽\n바닥을 쓸어주세요' },
        },
        {
            color: '#ff6b9d', colorBg: 'rgba(255,107,157,0.1)',
            phase: 1,
            phase1: { icon: '🧹', title: '책상쪽 쓸기', desc: '책상 사이사이\n바닥을 쓸어주세요' },
        },
        {
            color: '#f9a825', colorBg: 'rgba(249,168,37,0.1)',
            phase: 2,
            phase1: { icon: '🪣', title: '대걸레 준비', desc: '화장실에서 대걸레\n빨아오세요' },
            phase2: { icon: '🪣', title: '대걸레', desc: '쓸기가 끝난 구역부터\n바닥을 닦아주세요' },
        },
        {
            color: '#f9a825', colorBg: 'rgba(249,168,37,0.1)',
            phase: 2,
            phase1: { icon: '🪣', title: '대걸레 준비', desc: '화장실에서 대걸레\n빨아오세요' },
            phase2: { icon: '🪣', title: '대걸레', desc: '짝꿍이랑 앞뒤 나눠서\n바닥을 닦아주세요' },
        },
        {
            color: '#45aaf2', colorBg: 'rgba(69,170,242,0.1)',
            phase: 'both',
            phase1: { icon: '🪟', title: '환기', desc: '창문 열고\n블라인드 올려주세요' },
            phase2: { icon: '📐', title: '책상 줄 맞추기', desc: '모든 책상을\n줄 맞춰 정렬해 주세요' },
        },
    ];

    function enterApp() {
        document.documentElement.requestFullscreen().catch(()=>{});
        show('draw-screen');
    }

    function toggleFullscreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen();
        } else {
            document.exitFullscreen();
        }
    }
    document.addEventListener('fullscreenchange', () => {
        const btn = document.getElementById('fs-btn');
        if (btn) btn.textContent = document.fullscreenElement ? '✕' : '⛶';
    });

    const TOTAL = 900, PHASE_SPLIT = 450;
    let timeLeft = TOTAL, interval = null, paused = false;
    let currentPhase = 1, phaseTransitioned = false;
    let tappedCards = new Set(), shuffledRoles = [], flippedCount = 0;
    let celebInterval = null, rainbowEl = null;

    // 파티클
    const EMOJIS = ['⭐','✨','💫','🌟','🎈','🎀','🌸','💝'];
    const pBox = document.getElementById('particles');
    for (let i = 0; i < 20; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.textContent = EMOJIS[i % EMOJIS.length];
        p.style.left = (Math.random() * 100) + '%';
        p.style.animationDelay = (Math.random() * 14) + 's';
        p.style.animationDuration = (12 + Math.random() * 10) + 's';
        p.style.fontSize = (1 + Math.random() * 0.8) + 'em';
        pBox.appendChild(p);
    }

    function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

    // ── 뽑기 초기화 ──
    function initDraw() {
        shuffledRoles = shuffle([...ROLE_DEFS]);
        flippedCount = 0;
        const grid = document.getElementById('draw-grid');
        grid.innerHTML = '';
        document.getElementById('start-wrap').classList.remove('visible');

        shuffledRoles.forEach((role, idx) => {
            const r = role.phase1 || role.phase2;
            const phaseText = role.phase === 1 ? '1단계' : role.phase === 2 ? '2단계' : '1·2단계';
            const card = document.createElement('div');
            card.className = 'flip-card';
            card.innerHTML = `
                <div class="flip-card-inner">
                    <div class="flip-front">
                        <div class="num-badge" style="background:rgba(0,0,0,0.12);color:#555;">${idx + 1}</div>
                        <div class="mystery-emoji">🪄</div>
                        <div class="tap-text">탭!</div>
                    </div>
                    <div class="flip-back" style="border-color:${role.color};">
                        <div class="num-badge" style="background:${role.color}">${idx + 1}</div>
                        <div class="role-icon">${r.icon}</div>
                        <div class="role-title" style="color:${role.color}">${r.title}</div>
                        <div class="role-phase" style="background:${role.colorBg};color:${role.color};">${phaseText}</div>
                    </div>
                </div>`;
            card.addEventListener('click', () => {
                if (card.classList.contains('flipped')) return;
                card.classList.add('flipped');
                if (++flippedCount === 5) document.getElementById('start-wrap').classList.add('visible');
            });
            grid.appendChild(card);
        });
    }

    // ── 청소 시작 ──
    function startCleaning() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
        currentPhase = 1; phaseTransitioned = false;
        tappedCards.clear(); timeLeft = TOTAL; paused = false;
        document.getElementById('skip-btn').style.display = '';
        document.getElementById('finish-btn').style.display = 'none';
        document.getElementById('pause-btn').textContent = '⏸ 일시정지';
        renderQuestCards(); updateTimer(); updatePhaseBadge();
        show('timer-screen');
        if (interval) clearInterval(interval);
        interval = setInterval(tick, 1000);
    }

    // ── 카드 렌더 ──
    function renderQuestCards() {
        const grid = document.getElementById('quest-grid');
        grid.innerHTML = '';
        shuffledRoles.forEach((role, idx) => {
            const card = document.createElement('div');
            card.id = `card-${idx}`;
            let tagText, tagStyle, icon, title, desc, extraClass = '', tapHint = '';

            if (currentPhase === 1) {
                const r = role.phase1;
                if (role.phase === 1 || role.phase === 'both') {
                    tagText = '1단계';
                    tagStyle = `background:${role.colorBg};color:${role.color};`;
                    icon = r.icon; title = r.title; desc = r.desc;
                    tapHint = '<div class="tap-hint">탭하면 완료!</div>';
                } else {
                    tagText = '대기중';
                    tagStyle = 'background:rgba(0,0,0,0.05);color:rgba(0,0,0,0.3);';
                    icon = r.icon; title = r.title; desc = r.desc;
                    extraClass = 'waiting';
                }
            } else {
                if (role.phase === 1) {
                    tagText = '완료 ✓'; tagStyle = 'background:rgba(39,174,96,0.1);color:#27ae60;';
                    icon = '🎉'; title = '수고했어요!'; desc = '깨끗하게 쓸었어요!';
                    extraClass = 'card-done';
                } else {
                    const r = role.phase2;
                    tagText = '2단계'; tagStyle = `background:${role.colorBg};color:${role.color};`;
                    icon = r.icon; title = r.title; desc = r.desc;
                    tapHint = '<div class="tap-hint">탭하면 완료!</div>';
                }
            }

            card.className = `quest-card ${extraClass}`;
            card.style.borderColor = extraClass === 'card-done' ? 'rgba(39,174,96,0.35)'
                                   : extraClass === 'waiting'   ? 'rgba(0,0,0,0.07)'
                                   : role.color;
            const badgeColor = extraClass === 'card-done' ? '#27ae60'
                             : extraClass === 'waiting'   ? '#bbb'
                             : role.color;
            card.innerHTML = `
                <div class="num-badge" style="background:${badgeColor}">${idx + 1}</div>
                <div class="check-badge">✅</div>
                <div class="phase-tag" style="${tagStyle}">${tagText}</div>
                <div class="quest-icon">${icon}</div>
                <div class="quest-role" style="color:${extraClass ? (extraClass==='card-done'?'#27ae60':'#aaa') : role.color}">${title}</div>
                <div class="quest-desc">${desc.replace('\n','<br>')}</div>
                ${tapHint}`;

            if (!extraClass) {
                card.addEventListener('click', () => {
                    card.classList.toggle('tapped');
                    tappedCards.has(idx) ? tappedCards.delete(idx) : tappedCards.add(idx);
                    if (currentPhase === 1) {
                        const activeCount = ROLE_DEFS.filter(r => r.phase !== 2).length;
                        if (tappedCards.size >= activeCount) {
                            setTimeout(() => { timeLeft = PHASE_SPLIT; triggerPhase2(); }, 400);
                        }
                    } else if (currentPhase === 2) {
                        const activeCount = ROLE_DEFS.filter(r => r.phase !== 1).length;
                        if (tappedCards.size >= activeCount) {
                            setTimeout(() => {
                                clearInterval(interval);
                                launchConfetti();
                                setTimeout(() => showDone(), 800);
                            }, 400);
                        }
                    }
                });
            }
            grid.appendChild(card);
        });
    }

    // ── 타이머 ──
    function tick() {
        if (paused) return;
        timeLeft--;
        updateTimer();
        if (timeLeft <= 10 && timeLeft > 0) showCountdownPop(timeLeft);
        if (!phaseTransitioned && timeLeft <= PHASE_SPLIT) triggerPhase2();
        if (timeLeft <= 0) { clearInterval(interval); launchConfetti(); setTimeout(() => showDone(), 800); }
    }

    function showCountdownPop(num) {
        const el = document.createElement('div');
        el.className = 'countdown-pop';
        el.textContent = num;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 850);
    }

    function showDone() {
        // 무지개 배경 추가
        rainbowEl = document.createElement('div');
        rainbowEl.className = 'rainbow-bg';
        document.body.appendChild(rainbowEl);
        show('done-screen');
        // 폭죽 계속 터뜨리기
        launchConfetti();
        celebInterval = setInterval(launchConfetti, 1800);
        setTimeout(() => { clearInterval(celebInterval); celebInterval = null; }, 9000);
    }

    function triggerPhase2() {
        phaseTransitioned = true; paused = true; currentPhase = 2;
        tappedCards.clear();
        document.getElementById('skip-btn').style.display = 'none';
        document.getElementById('finish-btn').style.display = '';
        document.getElementById('pause-btn').textContent = '▶ 계속하기';
        updatePhaseBadge(); renderQuestCards();
        document.getElementById('phase-overlay').style.display = 'flex';
    }

    function skipPhase() {
        if (currentPhase !== 1) return;
        timeLeft = PHASE_SPLIT;
        triggerPhase2();
    }

    function finishCleaning() {
        clearInterval(interval);
        launchConfetti();
        setTimeout(() => showDone(), 800);
    }

    function updateTimer() {
        const tm = Math.floor(timeLeft/60), ts = timeLeft%60;
        document.getElementById('total-timer').textContent =
            `${String(tm).padStart(2,'0')}:${String(ts).padStart(2,'0')}`;

        const phaseLeft = currentPhase === 1 ? timeLeft - PHASE_SPLIT : timeLeft;
        const pm = Math.floor(phaseLeft/60), ps = phaseLeft%60;
        document.getElementById('phase-timer').textContent =
            `${String(pm).padStart(2,'0')}:${String(ps).padStart(2,'0')}`;
        document.getElementById('phase-timer-label').textContent =
            currentPhase === 1 ? '1단계 남은 시간' : '2단계 남은 시간';

        const phasePct = phaseLeft / PHASE_SPLIT;
        const pt = document.getElementById('phase-timer');
        if (phasePct > 0.5)       { pt.style.color = '#45aaf2'; pt.style.filter = 'drop-shadow(0 3px 8px rgba(69,170,242,0.35))'; }
        else if (phasePct > 0.25) { pt.style.color = '#f9a825'; pt.style.filter = 'drop-shadow(0 3px 8px rgba(249,168,37,0.4))'; }
        else                       { pt.style.color = '#e74c3c'; pt.style.filter = 'drop-shadow(0 3px 8px rgba(231,76,60,0.4))'; }

        const bar = document.getElementById('progress-bar');
        bar.style.width = (timeLeft/TOTAL*100) + '%';
        const pct = timeLeft/TOTAL;
        if (pct > 0.5)       bar.style.background = 'linear-gradient(90deg,#45aaf2,#ff6b9d)';
        else if (pct > 0.25) bar.style.background = 'linear-gradient(90deg,#f9a825,#ff6b9d)';
        else                  bar.style.background = 'linear-gradient(90deg,#e74c3c,#c0392b)';
    }

    function updatePhaseBadge() {
        const b = document.getElementById('phase-badge');
        if (currentPhase === 1) { b.className = 'phase-badge phase1'; b.textContent = '1단계 — 쓸기 & 환기'; }
        else                    { b.className = 'phase-badge phase2'; b.textContent = '2단계 — 대걸레 & 책상줄'; }
    }

    function closeOverlay() {
        document.getElementById('phase-overlay').style.display = 'none';
        paused = false;
        document.getElementById('pause-btn').textContent = '⏸ 일시정지';
    }

    function togglePause() {
        paused = !paused;
        document.getElementById('pause-btn').textContent = paused ? '▶ 계속하기' : '⏸ 일시정지';
    }

    function goToDraw() {
        if (interval) clearInterval(interval);
        if (celebInterval) { clearInterval(celebInterval); celebInterval = null; }
        if (rainbowEl) { rainbowEl.remove(); rainbowEl = null; }
        interval = null; timeLeft = TOTAL; paused = false;
        currentPhase = 1; phaseTransitioned = false;
        document.getElementById('phase-overlay').style.display = 'none';
        show('draw-screen'); initDraw();
    }

    function show(id) {
        ['cover-screen','draw-screen','timer-screen','done-screen'].forEach(s => {
            document.getElementById(s).style.display = s === id ? 'flex' : 'none';
        });
    }

    function launchConfetti() {
        const e = ['🎉','✨','🌟','🎊','⭐','🥳','🎈','💫','🌸','💝'];
        for (let i = 0; i < 28; i++) {
            setTimeout(() => {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.textContent = e[Math.floor(Math.random()*e.length)];
                c.style.left = Math.random()*100+'vw';
                c.style.animationDuration = (1.5+Math.random()*2)+'s';
                document.body.appendChild(c);
                setTimeout(() => c.remove(), 3500);
            }, i * 70);
        }
    }

    initDraw();

    // Service Worker 등록 (PWA)
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
            navigator.serviceWorker.register('sw.js').catch(function() {});
        });
    }
</script>
</body>
</html>
